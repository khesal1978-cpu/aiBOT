<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jannat AI | Groq Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff2d55;
      --secondary: #5856d6;
      --bg: #050505;
      --card-bg: rgba(25, 25, 25, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --glass: rgba(255, 255, 255, 0.03);
    }

    * { box-sizing: border-box; transition: all 0.2s ease; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; overflow-x: hidden; }
    
    .container { max-width: 1300px; margin: auto; }
    
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding: 20px; background: var(--glass); border-radius: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
    header h1 { margin: 0; font-size: 28px; font-weight: 800; background: linear-gradient(90deg, #ff2d55, #ff375f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status-badge { padding: 8px 16px; background: rgba(50, 215, 75, 0.1); color: #32d74b; border-radius: 30px; font-size: 12px; font-weight: 600; border: 1px solid rgba(50, 215, 75, 0.2); }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: var(--card-bg); padding: 25px; border-radius: 24px; border: 1px solid var(--border); position: relative; overflow: hidden; }
    .stat-card h3 { margin: 0; color: #888; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
    .stat-card p { margin: 15px 0 0; font-size: 36px; font-weight: 800; color: #fff; }

    .health-section { margin-bottom: 40px; }
    .health-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
    .token-node { padding: 20px; background: var(--glass); border: 1px solid var(--border); border-radius: 20px; text-align: center; position: relative; }
    .token-node.active { border-color: #32d74b; background: rgba(50, 215, 75, 0.05); }
    .token-node.offline { border-color: #ff453a; background: rgba(255, 69, 58, 0.05); }
    .token-node code { display: block; font-size: 10px; color: #888; margin: 10px 0; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 5px; }
    .token-node .tag { font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; margin-bottom: 8px; display: inline-block; }
    .tag.env { background: var(--secondary); color: #fff; }
    .tag.db { background: var(--primary); color: #fff; }

    .card { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border); padding: 30px; margin-bottom: 30px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .search-box { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; color: #fff; width: 350px; outline: none; }
    .search-box:focus { border-color: var(--primary); }

    table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
    th { padding: 15px; text-align: left; color: #888; font-size: 12px; }
    td { padding: 15px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    td:first-child { border-left: 1px solid var(--border); border-radius: 15px 0 0 15px; }
    td:last-child { border-right: 1px solid var(--border); border-radius: 0 15px 15px 0; }

    .btn { padding: 10px 18px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; display: inline-flex; align-items: center; gap: 8px; }
    .btn-vip { background: linear-gradient(135deg, #ffd60a 0%, #ff9f0a 100%); color: #000; }
    .btn-ban { background: #ff453a; color: #fff; }
    .btn-reset { background: var(--secondary); color: #fff; }

    .image-hub { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
    .img-card { border-radius: 15px; overflow: hidden; border: 1px solid var(--border); height: 200px; }
    .img-card img { width: 100%; height: 100%; object-fit: cover; }

    .upload-btn { background: var(--primary); color: #fff; padding: 15px 30px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>JANNAT AI ELITE</h1>
      <div id="storageStatus" class="status-badge">Storage: Detecting...</div>
    </header>

    <div class="health-section">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="font-size: 14px; margin:0; text-transform: uppercase; color: #888;">GROQ Token Failover Pool</h2>
        <span id="aiModelName" style="font-size: 12px; color: var(--primary); font-weight: bold;">Llama 3.3 70B</span>
      </div>
      <div class="health-grid" id="healthGrid"></div>
      
      <div class="card" style="margin-top: 20px; padding: 25px;">
        <h3 style="margin:0 0 15px 0; font-size: 13px; color: #888;">ADD NEW GROQ TOKEN</h3>
        <div style="display:flex; gap: 10px;">
          <input type="text" id="newTokenInput" class="search-box" style="flex:1;" placeholder="Paste gsk_... token here">
          <button class="btn btn-vip" onclick="addToken()">+ Add to Pool</button>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><h3>Total Users</h3><p id="statTotalUsers">0</p></div>
      <div class="stat-card"><h3>Premium VIPs</h3><p id="statPremiumUsers">0</p></div>
      <div class="stat-card"><h3>Today's Messages</h3><p id="statDailyMessages">0</p></div>
      <div class="stat-card"><h3>Restricted Users</h3><p id="statBannedUsers">0</p></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 style="margin:0;">User Command Center</h2>
        <input type="text" id="userSearch" class="search-box" placeholder="Search Users..." oninput="loadUsers()">
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Identity</th>
              <th>Status</th>
              <th>Usage (Msg/Pic)</th>
              <th>Total Stats</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 style="margin:0;">Visual Assets Hub</h2>
        <input type="file" id="imageInput" style="display:none;" onchange="uploadImage()">
        <button class="upload-btn" onclick="document.getElementById('imageInput').click()">+ Upload New Pic</button>
      </div>
      <div class="image-hub" id="imageGrid"></div>
    </div>
  </div>

  <script>
    async function fetchStats() {
      const res = await fetch('/api/stats');
      const stats = await res.json();
      document.getElementById('statTotalUsers').innerText = stats.totalUsers;
      document.getElementById('statPremiumUsers').innerText = stats.premiumUsers;
      document.getElementById('statDailyMessages').innerText = stats.dailyMessages;
      document.getElementById('statBannedUsers').innerText = stats.bannedUsers;
    }

    async function fetchHealth() {
      const res = await fetch('/api/config-status');
      const data = await res.json();
      document.getElementById('aiModelName').innerText = data.model;
      document.getElementById('storageStatus').innerText = `Storage: ${data.storage}`;
      
      const grid = document.getElementById('healthGrid');
      grid.innerHTML = data.tokens.map(t => `
        <div class="token-node ${t.status.toLowerCase() === 'active' ? 'active' : 'offline'}">
          <div class="tag ${t.type.toLowerCase()}">${t.type} Source</div>
          <div style="font-weight: 800; font-size: 16px;">Groq T${t.index}</div>
          <code>${t.masked}</code>
          <span style="font-size:11px; font-weight:600;">${t.status}</span>
          ${t.type === 'DB' ? `<button onclick="deleteToken(${t.id})" style="background:none; border:none; color:#ff453a; font-size:10px; cursor:pointer; display:block; width:100%; margin-top:10px;">[Remove]</button>` : ''}
        </div>
      `).join('');
    }

    async function addToken() {
      const input = document.getElementById('newTokenInput');
      const token = input.value.trim();
      if (!token) return;
      await fetch('/api/tokens', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      input.value = '';
      fetchHealth();
    }

    async function deleteToken(id) {
      if (!confirm('Delete this Groq token?')) return;
      await fetch(`/api/tokens/${id}`, { method: 'DELETE' });
      fetchHealth();
    }

    async function loadUsers() {
      const q = document.getElementById('userSearch').value;
      const res = await fetch(`/api/users?q=${q}`);
      const users = await res.json();
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>
            <div style="font-weight: 600;">${u.username || 'Anonymous'}</div>
            <code style="font-size:10px;">${u.id}</code>
          </td>
          <td><span style="color:${u.is_premium ? '#ffd60a':'#888'}; font-weight:800;">${u.is_premium ? 'VIP':'FREE'}</span></td>
          <td>${u.msgs_today} / ${u.imgs_today}</td>
          <td style="font-size:11px; color:#888;">Total: ${u.total_messages_all_time}</td>
          <td>
            <div style="display:flex; gap: 5px;">
              <button class="btn btn-vip" onclick="togglePremium('${u.id}', ${u.is_premium ? 0 : 1})">${u.is_premium ? '✕':'★'}</button>
              <button class="btn btn-ban" onclick="toggleBan('${u.id}', ${u.is_banned ? 0 : 1})">${u.is_banned ? 'Restore':'Ban'}</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function togglePremium(id, val) { await fetch(`/api/users/${id}/premium`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({is_premium: val}) }); loadUsers(); fetchStats(); }
    async function toggleBan(id, val) { await fetch(`/api/users/${id}/ban`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({is_banned: val}) }); loadUsers(); fetchStats(); }

    async function loadImages() {
      const res = await fetch('/api/images');
      const images = await res.json();
      document.getElementById('imageGrid').innerHTML = images.map(img => `
        <div class="img-card"><img src="/images/${img.filename}" loading="lazy"></div>
      `).join('');
    }

    async function uploadImage() {
      const file = document.getElementById('imageInput').files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('image', file);
      await fetch('/api/images', { method: 'POST', body: formData });
      loadImages();
    }

    setInterval(fetchStats, 5000);
    setInterval(fetchHealth, 10000);
    
    fetchStats(); fetchHealth(); loadUsers(); loadImages();
  </script>
</body>
</html>
