<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jannat AI | Elite Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff2d55;
      --secondary: #5856d6;
      --bg: #050505;
      --card-bg: rgba(25, 25, 25, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --glass: rgba(255, 255, 255, 0.03);
    }

    * { box-sizing: border-box; transition: all 0.2s ease; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; overflow-x: hidden; }
    
    .container { max-width: 1300px; margin: auto; }
    
    /* Header */
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding: 20px; background: var(--glass); border-radius: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
    header h1 { margin: 0; font-size: 28px; font-weight: 800; background: linear-gradient(90deg, #ff2d55, #ff375f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status-badge { padding: 8px 16px; background: rgba(50, 215, 75, 0.1); color: #32d74b; border-radius: 30px; font-size: 12px; font-weight: 600; border: 1px solid rgba(50, 215, 75, 0.2); }

    /* Stats Section */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: var(--card-bg); padding: 25px; border-radius: 24px; border: 1px solid var(--border); position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,45,85,0.05) 0%, transparent 70%); }
    .stat-card h3 { margin: 0; color: #888; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
    .stat-card p { margin: 15px 0 0; font-size: 36px; font-weight: 800; color: #fff; }

    /* AI Health Section */
    .health-section { margin-bottom: 40px; }
    .health-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
    .token-node { padding: 15px; background: var(--glass); border: 1px solid var(--border); border-radius: 15px; text-align: center; }
    .token-node.active { border-color: #32d74b; background: rgba(50, 215, 75, 0.05); }
    .token-node.offline { border-color: #ff453a; background: rgba(255, 69, 58, 0.05); }
    .token-node span { display: block; font-size: 10px; color: #888; margin-top: 5px; }

    /* Table Section */
    .card { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border); padding: 30px; margin-bottom: 30px; overflow: hidden; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .search-box { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; color: #fff; width: 350px; outline: none; }
    .search-box:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }

    table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
    th { padding: 15px; text-align: left; color: #888; font-size: 12px; text-transform: uppercase; }
    td { padding: 15px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    td:first-child { border-left: 1px solid var(--border); border-radius: 15px 0 0 15px; }
    td:last-child { border-right: 1px solid var(--border); border-radius: 0 15px 15px 0; }
    
    code { background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px; font-size: 12px; }

    /* Buttons */
    .btn { padding: 10px 18px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; display: inline-flex; align-items: center; gap: 8px; }
    .btn-vip { background: linear-gradient(135deg, #ffd60a 0%, #ff9f0a 100%); color: #000; }
    .btn-vip.active { background: #333; color: #ffd60a; border: 1px solid #ffd60a; }
    .btn-ban { background: #ff453a; color: #fff; }
    .btn-ban.active { background: #333; color: #ff453a; border: 1px solid #ff453a; }
    .btn-reset { background: var(--secondary); color: #fff; }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

    /* Image Hub */
    .image-hub { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
    .img-card { position: relative; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); height: 200px; }
    .img-card img { width: 100%; height: 100%; object-fit: cover; }
    .img-card:hover img { transform: scale(1.1); }

    .upload-btn { background: var(--primary); color: #fff; padding: 15px 30px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; }

    /* Responsive */
    @media (max-width: 768px) {
      .health-grid { grid-template-columns: repeat(3, 1fr); }
      .search-box { width: 100%; }
      .card-header { flex-direction: column; gap: 15px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>JANNAT AI ELITE</h1>
      <div class="status-badge">System Online • v2.1</div>
    </header>

    <div class="health-section">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="font-size: 16px; margin:0; text-transform: uppercase; color: #888;">AI Token Failover Pool</h2>
        <span id="aiModelName" style="font-size: 12px; color: var(--primary); font-weight: bold;">Llama 3.1 70B</span>
      </div>
      <div class="health-grid" id="healthGrid">
        <!-- Tokens dynamically loaded -->
      </div>
      
      <div class="card" style="margin-top: 20px; padding: 20px;">
        <h3 style="margin:0 0 15px 0; font-size: 14px; color: #888;">ADD BACKUP TOKEN</h3>
        <div style="display:flex; gap: 10px;">
          <input type="text" id="newTokenInput" class="search-box" style="flex:1;" placeholder="Paste hf_... token here">
          <button class="btn btn-vip" onclick="addToken()">+ Add to Pool</button>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><h3>Total Users</h3><p id="statTotalUsers">0</p></div>
      <div class="stat-card"><h3>Premium VIPs</h3><p id="statPremiumUsers">0</p></div>
      <div class="stat-card"><h3>Today's Messages</h3><p id="statDailyMessages">0</p></div>
      <div class="stat-card"><h3>Restricted Users</h3><p id="statBannedUsers">0</p></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 style="margin:0;">User Command Center</h2>
        <input type="text" id="userSearch" class="search-box" placeholder="Search ID, Username or Language..." oninput="loadUsers()">
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Identity</th>
              <th>Status</th>
              <th>Region</th>
              <th>Daily Usage</th>
              <th>Lifecycle</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 style="margin:0;">Visual Assets Hub</h2>
        <div>
          <input type="file" id="imageInput" style="display:none;" onchange="uploadImage()">
          <button class="upload-btn" onclick="document.getElementById('imageInput').click()">+ Upload New Pic</button>
        </div>
      </div>
      <div class="image-hub" id="imageGrid"></div>
    </div>
  </div>

  <script>
    async function fetchStats() {
      const res = await fetch('/api/stats');
      const stats = await res.json();
      document.getElementById('statTotalUsers').innerText = stats.totalUsers;
      document.getElementById('statPremiumUsers').innerText = stats.premiumUsers;
      document.getElementById('statDailyMessages').innerText = stats.dailyMessages;
      document.getElementById('statBannedUsers').innerText = stats.bannedUsers;
    }

    async function fetchHealth() {
      const res = await fetch('/api/config-status');
      const data = await res.json();
      document.getElementById('aiModelName').innerText = data.model;
      const grid = document.getElementById('healthGrid');
      grid.innerHTML = data.tokens.map(t => `
        <div class="token-node ${t.status.toLowerCase() === 'active' ? 'active' : 'offline'}">
          <div style="font-weight: 800; font-size: 14px;">T${t.index}</div>
          <div style="font-size: 10px; color: ${t.type === 'Env' ? '#5856d6' : '#ff2d55'}; margin-bottom: 5px;">${t.type}</div>
          <span>${t.status}</span>
          ${t.type === 'DB' ? `<button onclick="deleteToken(${t.id})" style="background:none; border:none; color:#ff453a; font-size:10px; cursor:pointer; margin-top:10px;">[Delete]</button>` : ''}
        </div>
      `).join('');
    }

    async function addToken() {
      const input = document.getElementById('newTokenInput');
      const token = input.value.trim();
      if (!token) return;
      await fetch('/api/tokens', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      input.value = '';
      fetchHealth();
    }

    async function deleteToken(id) {
      if (!confirm('Remove this backup token?')) return;
      await fetch(`/api/tokens/${id}`, { method: 'DELETE' });
      fetchHealth();
    }

    async function loadUsers() {
      const q = document.getElementById('userSearch').value;
      const res = await fetch(`/api/users?q=${q}`);
      const users = await res.json();
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>
            <div style="font-weight: 600;">${u.username || 'Anonymous'}</div>
            <code>${u.id}</code>
          </td>
          <td>
            <span style="color: ${u.is_premium ? '#ffd60a' : '#888'}; font-size: 11px; font-weight: 800;">
              ${u.is_premium ? '💎 ELITE' : 'FREE'}
            </span>
          </td>
          <td>${u.language}</td>
          <td>
            <div style="font-size: 12px;">💬 ${u.msgs_today} msgs</div>
            <div style="font-size: 12px; color: #888;">📸 ${u.imgs_today} pics</div>
          </td>
          <td>
            <div style="font-size: 11px; color: #888;">Joined: ${new Date(u.created_at).toLocaleDateString()}</div>
            <div style="font-size: 11px; color: #888;">Total: ${u.total_messages_all_time}</div>
          </td>
          <td>
            <div style="display:flex; gap: 8px;">
              <button class="btn btn-vip ${u.is_premium ? 'active' : ''}" onclick="togglePremium('${u.id}', ${u.is_premium ? 0 : 1})">
                ${u.is_premium ? 'Demote' : 'Make VIP'}
              </button>
              <button class="btn btn-ban ${u.is_banned ? 'active' : ''}" onclick="toggleBan('${u.id}', ${u.is_banned ? 0 : 1})">
                ${u.is_banned ? 'Restore' : 'Ban'}
              </button>
              <button class="btn btn-reset" onclick="resetCredits('${u.id}')">Reset</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function togglePremium(id, val) { await fetch(`/api/users/${id}/premium`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({is_premium: val}) }); loadUsers(); fetchStats(); }
    async function toggleBan(id, val) { await fetch(`/api/users/${id}/ban`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({is_banned: val}) }); loadUsers(); fetchStats(); }
    async function resetCredits(id) { if(confirm('Reset usage for this user?')) { await fetch(`/api/users/${id}/reset`, { method: 'POST' }); loadUsers(); } }

    async function loadImages() {
      const res = await fetch('/api/images');
      const images = await res.json();
      document.getElementById('imageGrid').innerHTML = images.map(img => `
        <div class="img-card">
          <img src="/images/${img.filename}" loading="lazy">
        </div>
      `).join('');
    }

    async function uploadImage() {
      const file = document.getElementById('imageInput').files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('image', file);
      const btn = document.querySelector('.upload-btn');
      btn.innerText = 'Uploading...';
      await fetch('/api/images', { method: 'POST', body: formData });
      btn.innerText = '+ Upload New Pic';
      loadImages();
    }

    // Auto Refresh
    setInterval(fetchStats, 5000);
    setInterval(fetchHealth, 10000);
    setInterval(loadUsers, 15000);

    // Initial Load
    fetchStats();
    fetchHealth();
    loadUsers();
    loadImages();
  </script>
</body>
</html>
